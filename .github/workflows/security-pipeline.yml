name: Azure Sentinel Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-security:
    name: Terraform Validate & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true
          skip_check: CKV_AZURE_206,CKV_AZURE_59,CKV_AZURE_190,CKV_AZURE_205,CKV_AZURE_199,CKV_AZURE_202,CKV_AZURE_204,CKV_AZURE_203,CKV_AZURE_201,CKV_AZURE_189

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
